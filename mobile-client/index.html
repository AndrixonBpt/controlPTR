<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Canva Remote</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; /* Evitar scroll al presionar */
      background-color: #1e1e1e;
      color: white;
      touch-action: manipulation; /* Optimiza los toques en móviles */
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }

    button {
      flex: 1;
      border: none;
      font-size: 4rem;
      font-weight: 800;
      text-transform: uppercase;
      color: white;
      cursor: pointer;
      transition: filter 0.1s;
      /* Evitar selección de texto al tocar rápidamente */
      -webkit-user-select: none;
      user-select: none;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    #btn-next {
      background-color: #00c4cc; /* Color turquesa estilo Canva */
      /* El botón Siguiente va arriba por ser el más usado */
    }

    #btn-next:active {
      filter: brightness(0.8);
    }

    #btn-prev {
      background-color: #3e3e3e;
      font-size: 3rem; /* Ligeramente más pequeño para dar jerarquía visual al siguiente */
    }

    #btn-prev:active {
      filter: brightness(0.8);
    }

    .status {
      position: absolute;
      top: 15px;
      left: 15px;
      font-size: 0.9rem;
      font-weight: 600;
      background: rgba(0,0,0,0.6);
      padding: 6px 12px;
      border-radius: 20px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="status" id="status">Conectando...</div>
  <div class="container">
    <button id="btn-next">Siguiente</button>
    <button id="btn-prev">Anterior</button>
  </div>

  <!-- Cliente de Socket.io -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    /* 
      IMPORTANTE: La URL del servidor.
      Como ahora este archivo se sirve desde el propio servidor Express (http://MI_IP:3000),
      podemos usar window.location.origin para que se autoconfigure a la IP actual del dispositivo.
      
      Si abres el archivo localmente sin el servidor, deberás cambiar esto por:
      const SERVER_URL = "http://192.168.X.X:3000"; (tu IP local)
    */
    const SERVER_URL = window.location.origin;
    const socket = io(SERVER_URL);

    const statusEl = document.getElementById('status');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');

    socket.on('connect', () => {
      statusEl.textContent = '🟢 Conectado';
      statusEl.style.color = '#00ff00';
    });

    socket.on('disconnect', () => {
      statusEl.textContent = '🔴 Desconectado';
      statusEl.style.color = '#ff0000';
    });

    // Función para emitir comandos
    const sendCommand = (cmd) => {
      socket.emit('send_command', cmd);
      // Añadir una pequeña vibración táctil si el móvil lo soporta (Feedback háptico)
      if (navigator.vibrate) {
        navigator.vibrate(50);
      }
    };

    // Usar touchstart para respuesta instantánea en móviles, con mousedown como respaldo para PC
    const addFastClick = (element, command) => {
      element.addEventListener('touchstart', (e) => {
        e.preventDefault(); // Evitar comportamientos por defecto como el doble toque de zoom
        sendCommand(command);
      }, { passive: false });
      
      element.addEventListener('mousedown', (e) => {
        // Solo actuar en mousedown si no es un evento táctil simulado
        if (e.pointerType !== 'touch') {
          sendCommand(command);
        }
      });
    };

    addFastClick(btnNext, 'next');
    addFastClick(btnPrev, 'prev');
  </script>
</body>
</html>
